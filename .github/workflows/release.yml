name: Build and Release

on:
  push:
    branches: [main, development]
    tags: ['v*']
  pull_request:
    branches: [main, development]
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os-name: windows
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            os-name: linux
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.os-name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf curl wget

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install JS dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace packages
        run: pnpm run build

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}

      - name: Prepare Artifacts (Windows)
        if: matrix.os-name == 'windows'
        shell: pwsh
        run: |
          $buildDir = "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          mkdir -Force atlas-windows/nsis
          mkdir -Force atlas-windows/msi
          Copy-Item "$buildDir/nsis/*.exe" -Destination "atlas-windows/nsis/"
          Copy-Item "$buildDir/msi/*.msi" -Destination "atlas-windows/msi/"
          Compress-Archive -Path "atlas-windows/*" -DestinationPath atlas-windows.zip
          mkdir -Force dist-artifacts
          Move-Item atlas-windows.zip dist-artifacts/

      - name: Prepare Artifacts (Linux)
        if: matrix.os-name == 'linux'
        run: |
          mkdir -p dist-artifacts
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage dist-artifacts/ || true
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb dist-artifacts/ || true

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || (github.ref == 'refs/heads/main' && 'nightly' || 'development') }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || (github.ref == 'refs/heads/main' && 'Nightly Build' || 'Development Build') }}
          prerelease: ${{ github.ref_type != 'tag' }}
          files: dist-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
