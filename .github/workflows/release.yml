name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: install frontend deps
        run: pnpm install

      - name: build backends / utilities
        run: pnpm run build

      - name: Build Sidecars (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cd apps/backend
          pnpm run build:sidecar

      - name: Build Sidecars (Mac/Linux)
        if: matrix.platform != 'windows-latest'
        run: |
          cd apps/backend
          # Adjust pkg target depending on matrix (this is just illustrative, requires more precise matching)
          npx pkg . -t node18-macos-arm64,node18-macos-x64,node18-linux-x64 -o ../desktop/src-tauri/bin/atlas-backend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: atlas-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version
          releaseName: 'Atlas v__VERSION__'
          releaseBody: 'See the attached artifacts for the latest version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
