name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 3. pnpm ─────────────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      # ── 4. Rust ─────────────────────────────────────────────────────────────
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 5. Cache pnpm store ──────────────────────────────────────────────────
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      # ── 6. Cache Cargo ────────────────────────────────────────────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      # ── 7. Install all JS dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ── 8. Build internal packages (@atlas/*) ───────────────────────────────
      - name: Build workspace packages
        run: pnpm run build

      # ── 9. Compile backend + bundle as standalone .exe sidecar ──────────────
      - name: Build backend sidecar (Windows x64)
        working-directory: apps/backend
        run: pnpm run build:sidecar

      # ── 10. Verify sidecar was produced ─────────────────────────────────────
      - name: Verify sidecar binary exists
        shell: pwsh
        run: |
          $sidecar = "apps/desktop/src-tauri/bin/atlas-backend-x86_64-pc-windows-msvc.exe"
          if (!(Test-Path $sidecar)) {
            Write-Error "Sidecar binary not found at $sidecar"
            exit 1
          }
          $size = (Get-Item $sidecar).Length / 1MB
          Write-Host "Sidecar built successfully: $([math]::Round($size, 1)) MB"

      # ── 11. Build Tauri app (NSIS installer + MSI) ───────────────────────
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: atlas-v__VERSION__
          releaseName: Atlas v__VERSION__
          releaseBody: See the attached installer for the latest release.
          releaseDraft: true
          prerelease: true
          args: --target x86_64-pc-windows-msvc

      # ── 12. Upload build artifacts ────────────────────────────────────────
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: atlas-windows-${{ github.sha }}
          path: |
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 14
          if-no-files-found: warn
